<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Cost Calculator | What does underusing AI cost?</title>
  <meta name="description" content="Estimate what it costs your company not to fully use Microsoft Copilot and ChatGPT." />
  <link rel="canonical" href="https://superintelligent.se/en.html" />
  <link rel="alternate" hreflang="sv" href="https://superintelligent.se/" />
  <link rel="alternate" hreflang="en" href="https://superintelligent.se/en.html" />
  <link rel="alternate" hreflang="x-default" href="https://superintelligent.se/" />
  <style>
    :root {
      --bg: #eef4fb;
      --card: #f8fbff;
      --text: #20324d;
      --muted: #3f4f67;
      --line: #d3dfef;
      --blue: #1566be;
      --blue-dark: #0f4f95;
      --green: #43a329;
      --orange: #d96a00;
      --radius: 18px;
      --shadow: 0 10px 24px rgba(10, 42, 90, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #f9fcff 0%, #dce8f7 100%);
      line-height: 1.4;
      min-height: 100vh;
    }

    main {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .calculator {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section {
      padding: 24px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child { border-bottom: 0; }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.06;
      text-align: center;
      margin: 0;
    }

    .lead {
      margin: 0;
      text-align: center;
      font-size: clamp(1.1rem, 2.7vw, 2rem);
      color: var(--muted);
    }

    .lead strong { color: var(--text); }

    label {
      display: block;
      text-align: center;
      font-size: clamp(1.25rem, 2.6vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input {
      width: min(100%, 360px);
      border: 2px solid #bccde4;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1.7rem;
      color: var(--text);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .calculate {
      background: linear-gradient(#2c7fd8, var(--blue));
      box-shadow: inset 0 1px 0 #69a7eb;
      font-size: 2rem;
      padding: 10px 24px;
      min-width: 240px;
    }

    .error {
      margin-top: 12px;
      min-height: 24px;
      font-weight: 700;
      text-align: center;
      color: #b02626;
    }

    .result-title {
      text-align: center;
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3rem);
    }

    .yearly {
      font-size: clamp(2.7rem, 8vw, 5.8rem);
      text-align: center;
      color: var(--orange);
      font-weight: 800;
      margin: 18px 0;
      line-height: 1.05;
    }

    .sub-results {
      background: linear-gradient(90deg, rgba(21,102,190,0.13) 0%, rgba(21,102,190,0.36) 20%, rgba(21,102,190,0.36) 80%, rgba(21,102,190,0.13) 100%);
      border-radius: 12px;
      overflow: hidden;
    }

    .sub-row {
      font-size: clamp(1.5rem, 3.7vw, 2.8rem);
      text-align: center;
      padding: 12px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 1px rgba(0,0,0,.3);
    }

    .sub-row + .sub-row {
      border-top: 1px solid rgba(255,255,255,.35);
    }

    .cta-wrap {
      padding-top: 26px;
      text-align: center;
    }

    .cta {
      display: inline-block;
      background: linear-gradient(#58ba38, var(--green));
      box-shadow: inset 0 1px 0 #8ad06f;
      text-decoration: none;
      font-size: clamp(1.3rem, 3vw, 2rem);
      color: #fff;
      font-weight: 700;
      padding: 14px 20px;
      border-radius: 10px;
      min-width: min(100%, 620px);
    }

    .lang-switch {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
      font-size: .95rem;
      gap: 10px;
    }

    .lang-switch a {
      color: var(--blue-dark);
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .section { padding: 18px 14px; }
      .calculate { width: 100%; font-size: 1.7rem; }
      input { font-size: 1.45rem; }
      .cta { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <div class="lang-switch" aria-label="Language">
      <a href="/" lang="sv">Svenska</a>
      <span>English</span>
    </div>

    <section class="calculator" aria-label="AI cost calculator">
      <div class="section">
        <h1>How much is it costing you to not use AI to its full potential?</h1>
      </div>

      <div class="section">
        <p class="lead">Most companies lose at least <strong>€10,000 per employee per year</strong> due to inefficiency.</p>
      </div>

      <div class="section">
        <label for="employees">Enter number of office employees in your company:</label>
        <div class="controls">
          <input id="employees" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 25" aria-describedby="feedback" />
          <button class="calculate" id="calculateBtn" type="button">Calculate</button>
        </div>
        <p id="feedback" class="error" aria-live="polite"></p>
      </div>

      <div class="section">
        <h2 class="result-title">Estimated loss:</h2>
        <p class="yearly" id="yearResult">€0 / year</p>
        <div class="sub-results" role="status" aria-live="polite">
          <div class="sub-row" id="monthResult">€0 / month</div>
          <div class="sub-row" id="dayResult">€0 / day</div>
        </div>

        <div class="cta-wrap">
          <a class="cta" href="#demo">Book a demo &amp; reduce the cost</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const employeesInput = document.getElementById('employees');
    const feedback = document.getElementById('feedback');
    const calculateBtn = document.getElementById('calculateBtn');
    const yearResult = document.getElementById('yearResult');
    const monthResult = document.getElementById('monthResult');
    const dayResult = document.getElementById('dayResult');

    const COST_PER_EMPLOYEE_SEK = 100000;
    const SEK_PER_EUR = 10;
    const COST_PER_EMPLOYEE_EUR = COST_PER_EMPLOYEE_SEK / SEK_PER_EUR;
    const DAYS_PER_YEAR = 365;
    const MONTHS_PER_YEAR = 12;

    function formatEUR(value) {
      return new Intl.NumberFormat('en', {
        style: 'currency',
        currency: 'EUR',
        maximumFractionDigits: 0
      }).format(value);
    }

    function setResults(annualCost) {
      const monthlyCost = annualCost / MONTHS_PER_YEAR;
      const dailyCost = annualCost / DAYS_PER_YEAR;

      yearResult.textContent = `${formatEUR(annualCost)} / year`;
      monthResult.textContent = `${formatEUR(monthlyCost)} / month`;
      dayResult.textContent = `${formatEUR(dailyCost)} / day`;
    }

    function validateEmployees(value) {
      if (value === '') {
        return 'Enter the number of employees and we will show how much can be saved with stronger AI adoption.';
      }

      const number = Number(value);

      if (!Number.isFinite(number)) {
        return 'Please enter a valid employee count to get a reliable estimate.';
      }

      if (number === 0) {
        return 'Start with at least 1 employee to reveal how quickly inefficiency creates avoidable cost.';
      }

      if (number < 0) {
        return 'Negative values are not possible here — enter your real employee count and let AI pay off faster.';
      }

      return '';
    }

    function runCalculation() {
      const value = employeesInput.value.trim();
      const errorMessage = validateEmployees(value);

      if (errorMessage) {
        feedback.textContent = errorMessage;
        return;
      }

      feedback.textContent = '';
      const employees = Number(value);
      const annualCost = employees * COST_PER_EMPLOYEE_EUR;
      setResults(annualCost);
    }

    calculateBtn.addEventListener('click', runCalculation);
    employeesInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        runCalculation();
      }
    });
  </script>
</body>
</html>
