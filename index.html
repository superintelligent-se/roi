<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI-kostnadskalkylator | Vad kostar utebliven AI-användning?</title>
  <meta name="description" content="Räkna ut vad det kostar ert företag att inte använda Microsoft Copilot och ChatGPT fullt ut." />
  <link rel="canonical" href="https://superintelligent.se/" />
  <link rel="alternate" hreflang="sv" href="https://superintelligent.se/" />
  <link rel="alternate" hreflang="en" href="https://superintelligent.se/en.html" />
  <link rel="alternate" hreflang="x-default" href="https://superintelligent.se/" />
  <style>
    :root {
      --bg: #ebf1ff;
      --card: #ffffff;
      --text: #10223f;
      --muted: #3d4f71;
      --line: #d2def8;
      --blue: #2E72EB;
      --blue-dark: #1852b8;
      --blue-soft: #dce9ff;
      --green: #31a25f;
      --green-dark: #1f854a;
      --orange: #da6a0e;
      --result-bg: #edf3ff;
      --radius: 18px;
      --shadow: 0 16px 36px rgba(17, 47, 104, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #f8fbff 0%, #d8e7ff 55%, #cedfff 100%);
      line-height: 1.4;
      min-height: 100vh;
    }

    main {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .calculator {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .section {
      padding: 24px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.06;
      text-align: center;
      margin: 0;
    }

    .lead {
      margin: 0;
      text-align: center;
      font-size: clamp(1.1rem, 2.7vw, 2rem);
      color: var(--muted);
    }

    .lead strong {
      color: var(--text);
    }

    label {
      display: block;
      text-align: center;
      font-size: clamp(1.25rem, 2.6vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input {
      width: min(100%, 360px);
      border: 2px solid #b8ccf5;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1.7rem;
      color: var(--text);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .calculate {
      background: linear-gradient(#4d89f3, var(--blue));
      box-shadow: inset 0 1px 0 #87aff7, 0 8px 16px rgba(27, 82, 184, 0.25);
      font-size: 2rem;
      padding: 10px 24px;
      min-width: 240px;
    }

    .mode-toggle {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .mode-btn {
      color: var(--blue-dark);
      background: #fff;
      border: 1px solid #b5ccfb;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(21, 66, 147, 0.12);
    }

    .mode-btn.active {
      color: #fff;
      background: linear-gradient(180deg, #4987f4 0%, var(--blue-dark) 100%);
      border-color: var(--blue-dark);
    }

    .error {
      margin-top: 12px;
      min-height: 24px;
      font-weight: 700;
      text-align: center;
      color: #b02626;
    }

    .result-title {
      text-align: center;
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3rem);
    }

    .yearly {
      font-size: clamp(2.7rem, 8vw, 5.8rem);
      text-align: center;
      color: var(--orange);
      font-weight: 800;
      margin: 18px 0;
      line-height: 1.05;
    }

    .sub-results {
      background: linear-gradient(90deg, rgba(46,114,235,0.13) 0%, rgba(46,114,235,0.45) 20%, rgba(46,114,235,0.45) 80%, rgba(46,114,235,0.13) 100%);
      border-radius: 12px;
      overflow: hidden;
    }

    .sub-row {
      font-size: clamp(1.5rem, 3.7vw, 2.8rem);
      text-align: center;
      padding: 12px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 1px rgba(0,0,0,.3);
    }

    .sub-row + .sub-row {
      border-top: 1px solid rgba(255,255,255,.35);
    }

    .cta-wrap {
      padding-top: 26px;
      text-align: center;
      color: #b42318;
      font-size: 1.1rem;
      font-weight: 600;
      min-height: 1.3em;
    }

    .cta {
      display: inline-block;
      background: linear-gradient(#46bc77, var(--green));
      box-shadow: inset 0 1px 0 #7ad5a2;
      text-decoration: none;
      font-size: clamp(1.3rem, 3vw, 2rem);
      padding: 14px 20px;
      border-radius: 10px;
      min-width: min(100%, 620px);
    }

    .lang-switch {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
      font-size: .95rem;
      gap: 10px;
    }

    .lang-switch a {
      color: var(--blue-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
      padding: 0;
      margin: -1px;
    }

    @media (max-width: 640px) {
      .section {
        padding: 18px 14px;
      }

      .calculate {
        width: 100%;
        font-size: 1.7rem;
      }

      .mode-btn {
        width: 100%;
      }

      input {
        font-size: 1.45rem;
      }

      .cta {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="lang-switch" aria-label="Språk">
      <span>Svenska</span>
      <a href="en.html" lang="en">English</a>
    </div>

    <section class="calculator" aria-label="Kalkylator för AI-kostnad">
      <div class="section">
        <h1>Hur mycket kostar det er att inte använda AI fullt ut?</h1>
      </div>

      <div class="section">
        <p class="lead">De flesta företag förlorar <strong>minst <span id="basisAmount">100 000 kr</span></strong> per tjänsteman och år i ineffektivitet.</p>
      </div>

      <div class="section">
        <label for="employees">Ange antal tjänstemän i ert företag:</label>
        <div class="controls">
          <input id="employees" type="number" min="1" step="1" inputmode="numeric" placeholder="t.ex. 25" aria-describedby="feedback" />
          <button class="calculate" id="calculateBtn" type="button">Räkna ut</button>
        </div>
        <div class="mode-toggle" aria-label="Val av beräkningsmodell">
          <button type="button" class="mode-btn active" id="standardModeBtn">Standard: 100 000 kr</button>
          <button type="button" class="mode-btn" id="conservativeModeBtn">Konservativ beräkning: 75 000 kr</button>
        </div>
        <p id="feedback" class="error" aria-live="polite"></p>
      </div>

      <div class="section" id="resultSection">
        <h2 class="result-title">Ni förlorar uppskattningsvis:</h2>
        <p class="yearly" id="yearResult">0 kr / år</p>
        <div class="sub-results" role="status" aria-live="polite">
          <div class="sub-row" id="monthResult">0 kr / månad</div>
          <div class="sub-row" id="dayResult">0 kr / dag</div>
        </div>

        <div class="cta-wrap">
          <a class="cta" href="#demo">Boka en demo &amp; minska kostnaden</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const employeesInput = document.getElementById('employees');
    const feedback = document.getElementById('feedback');
    const calculateBtn = document.getElementById('calculateBtn');
    const yearResult = document.getElementById('yearResult');
    const monthResult = document.getElementById('monthResult');
    const dayResult = document.getElementById('dayResult');
    const basisAmount = document.getElementById('basisAmount');
    const standardModeBtn = document.getElementById('standardModeBtn');
    const conservativeModeBtn = document.getElementById('conservativeModeBtn');

    const STANDARD_COST_PER_EMPLOYEE = 100000;
    const CONSERVATIVE_COST_PER_EMPLOYEE = 75000;
    const DAYS_PER_YEAR = 365;
    const MONTHS_PER_YEAR = 12;
    let costPerEmployee = STANDARD_COST_PER_EMPLOYEE;

    function formatSEK(value) {
      return new Intl.NumberFormat('sv-SE', {
        style: 'currency',
        currency: 'SEK',
        maximumFractionDigits: 0
      }).format(value);
    }

    function setResults(annualCost) {
      const monthlyCost = annualCost / MONTHS_PER_YEAR;
      const dailyCost = annualCost / DAYS_PER_YEAR;

      yearResult.textContent = `${formatSEK(annualCost)} / år`;
      monthResult.textContent = `${formatSEK(monthlyCost)} / månad`;
      dayResult.textContent = `${formatSEK(dailyCost)} / dag`;
    }

    function validateEmployees(value) {
      if (value === '') {
        return 'Fyll i antal tjänstemän så visar vi hur mycket ni kan spara med rätt AI-stöd.';
      }

      const number = Number(value);

      if (!Number.isFinite(number)) {
        return 'Ange ett giltigt antal tjänstemän för att få en tydlig besparingsbild.';
      }

      if (number === 0) {
        return 'Skriv in minst 1 tjänsteman så ser ni hur snabbt ineffektivitet blir dyrt.';
      }

      if (number < 0) {
        return 'Negativa tal fungerar inte här – ange faktiskt antal tjänstemän och låt oss räkna hem AI-investeringen.';
      }

      return '';
    }

    function setMode(mode) {
      const isConservative = mode === 'conservative';
      costPerEmployee = isConservative ? CONSERVATIVE_COST_PER_EMPLOYEE : STANDARD_COST_PER_EMPLOYEE;
      basisAmount.textContent = `${costPerEmployee.toLocaleString('sv-SE')} kr`;
      standardModeBtn.classList.toggle('active', !isConservative);
      conservativeModeBtn.classList.toggle('active', isConservative);
    }

    function runCalculation() {
      const value = employeesInput.value.trim();
      const errorMessage = validateEmployees(value);

      if (errorMessage) {
        feedback.textContent = errorMessage;
        return;
      }

      feedback.textContent = '';
      const employees = Number(value);
      const annualCost = employees * costPerEmployee;
      setResults(annualCost);
    }

    standardModeBtn.addEventListener('click', () => setMode('standard'));
    conservativeModeBtn.addEventListener('click', () => setMode('conservative'));
    calculateBtn.addEventListener('click', runCalculation);
    employeesInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        runCalculation();
      }
    });
  </script>
</body>
</html>
